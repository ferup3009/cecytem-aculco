<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración - CECYTEM Aculco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <style>
    :root { --cecytem-navy: #2B2E63; --cecytem-wine: #8A1C3D; }
    body { background-color: #F4F5FA; font-family: 'Segoe UI', sans-serif; }
    .bg-cecytem { background-color: var(--cecytem-navy) !important; }
    .btn-wine { background-color: var(--cecytem-wine); color: white; }
    .btn-wine:hover { background-color: #6d1630; color: white; }
  </style>
</head>
<body>

  <!-- Barra de navegación -->
  <nav class="navbar navbar-dark bg-cecytem mb-4">
    <div class="container">
      <span class="navbar-brand mb-0 h1"><i class="bi bi-database-fill-gear me-2"></i>Panel de Administración de Contactos</span>
      <a href="index.html" class="btn btn-outline-light btn-sm">Volver al Sitio Web</a>
    </div>
  </nav>

  <div class="container">
    <div class="row">
      <!-- Formulario de Gestión -->
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm">
          <div class="card-header bg-cecytem text-white fw-bold">Gestionar Registro</div>
          <div class="card-body">
            <form id="formGestion">
              <input type="hidden" id="docId"> <!-- ID oculto para actualizar/borrar -->
              
              <div class="mb-3">
                <label class="form-label fw-bold">Nombre</label>
                <input type="text" class="form-control" id="gNombre" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Teléfono</label>
                <input type="text" class="form-control" id="gTelefono" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Correo</label>
                <input type="email" class="form-control" id="gCorreo">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Asunto</label>
                <input type="text" class="form-control" id="gAsunto" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Mensaje</label>
                <textarea class="form-control" id="gMensaje" rows="3" required></textarea>
              </div>

              <div class="d-grid gap-2">
                <button type="button" class="btn btn-success" onclick="guardarDatos()">
                  <i class="bi bi-save me-1"></i> Guardar Nuevo
                </button>
                <button type="button" class="btn btn-warning text-dark" onclick="actualizarDatos()">
                  <i class="bi bi-pencil-square me-1"></i> Actualizar
                </button>
                <button type="button" class="btn btn-danger" onclick="borrarDatos()">
                  <i class="bi bi-trash me-1"></i> Borrar
                </button>
                <button type="button" class="btn btn-secondary" onclick="limpiarFormulario()">
                  <i class="bi bi-eraser me-1"></i> Limpiar / Cancelar
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Tabla de Datos -->
      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-header bg-cecytem text-white fw-bold d-flex justify-content-between align-items-center">
            <span><i class="bi bi-table me-1"></i> Base de Datos de Contactos</span>
            <button class="btn btn-sm btn-light" onclick="cargarDatos()">
              <i class="bi bi-arrow-clockwise"></i> Refrescar
            </button>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover table-striped mb-0 align-middle">
                <thead class="table-dark">
                  <tr>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Asunto</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tablaCuerpo">
                  <tr><td colspan="5" class="text-center py-4">Cargando datos...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts de Firebase y Lógica del Panel -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // PEGA AQUÍ LA MISMA CONFIGURACIÓN DE FIREBASE QUE USASTE EN INDEX.HTML
    const firebaseConfig = {
      apiKey: "TU_API_KEY_AQUI",
      authDomain: "tu-proyecto.firebaseapp.com",
      projectId: "tu-proyecto",
      storageBucket: "tu-proyecto.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Hacer las funciones globales para que los botones HTML las puedan llamar
    window.cargarDatos = async function() {
      const tbody = document.getElementById('tablaCuerpo');
      tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4">Cargando...</td></tr>';
      
      try {
        const querySnapshot = await getDocs(collection(db, "contactos"));
        tbody.innerHTML = ''; // Limpiar
        
        if (querySnapshot.empty) {
          tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No hay registros en la base de datos.</td></tr>';
          return;
        }

        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const row = `
            <tr>
              <td class="fw-bold">${data.nombre}</td>
              <td>${data.telefono}</td>
              <td><span class="badge bg-secondary">${data.asunto}</span></td>
              <td><small>${data.fecha}</small></td>
              <td>
                <button class="btn btn-sm btn-primary" onclick="editarRegistro('${docSnap.id}', '${data.nombre}', '${data.telefono}', '${data.correo}', '${data.asunto}', '${data.mensaje}')">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-danger" onclick="eliminarRegistro('${docSnap.id}')">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          `;
          tbody.innerHTML += row;
        });
      } catch (error) {
        console.error("Error al cargar:", error);
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">Error al cargar datos</td></tr>';
      }
    };

    window.guardarDatos = async function() {
      const nombre = document.getElementById('gNombre').value;
      const telefono = document.getElementById('gTelefono').value;
      const correo = document.getElementById('gCorreo').value;
      const asunto = document.getElementById('gAsunto').value;
      const mensaje = document.getElementById('gMensaje').value;

      if(!nombre || !telefono || !asunto) { alert("Nombre, Teléfono y Asunto son obligatorios"); return; }

      try {
        await addDoc(collection(db, "contactos"), {
          nombre, telefono, correo, asunto, mensaje,
          fecha: new Date().toLocaleString()
        });
        alert("Registro guardado exitosamente");
        window.limpiarFormulario();
        window.cargarDatos();
      } catch (error) {
        alert("Error al guardar: " + error.message);
      }
    };

    window.editarRegistro = function(id, nombre, telefono, correo, asunto, mensaje) {
      document.getElementById('docId').value = id;
      document.getElementById('gNombre').value = nombre;
      document.getElementById('gTelefono').value = telefono;
      document.getElementById('gCorreo').value = correo;
      document.getElementById('gAsunto').value = asunto;
      document.getElementById('gMensaje').value = mensaje;
      window.scrollTo(0, 0); // Subir al formulario
    };

    window.actualizarDatos = async function() {
      const id = document.getElementById('docId').value;
      if (!id) { alert("Primero selecciona un registro de la tabla para editar (botón azul del lápiz)"); return; }

      const datosActualizados = {
        nombre: document.getElementById('gNombre').value,
        telefono: document.getElementById('gTelefono').value,
        correo: document.getElementById('gCorreo').value,
        asunto: document.getElementById('gAsunto').value,
        mensaje: document.getElementById('gMensaje').value
      };

      try {
        const docRef = doc(db, "contactos", id);
        await updateDoc(docRef, datosActualizados);
        alert("Registro actualizado exitosamente");
        window.limpiarFormulario();
        window.cargarDatos();
      } catch (error) {
        alert("Error al actualizar: " + error.message);
      }
    };

    window.eliminarRegistro = async function(id) {
      if (!confirm("¿Estás seguro de que deseas borrar este registro permanentemente?")) return;
      try {
        await deleteDoc(doc(db, "contactos", id));
        alert("Registro eliminado");
        window.limpiarFormulario();
        window.cargarDatos();
      } catch (error) {
        alert("Error al eliminar: " + error.message);
      }
    };

    window.limpiarFormulario = function() {
      document.getElementById('formGestion').reset();
      document.getElementById('docId').value = '';
    };

    // Cargar datos al abrir la página
    window.cargarDatos();
  </script>
</body>
</html>
